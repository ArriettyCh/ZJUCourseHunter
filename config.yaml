# ── 抢课配置 ──

grab:
  interval: 1.0          # 请求间隔（秒）
  jitter: 0.3            # 随机抖动幅度（秒），实际间隔 = interval ± jitter
  max_attempts: 0        # 最大重试次数，0 表示无限制
  request_timeout: 10    # 单次请求超时（秒）

